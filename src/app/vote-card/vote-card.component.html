<div class="card" (click)="onVotePerfomance()">
  <div class="vote-button" >
    <div class="performance-name">
      {{item.performanceName}}
    </div>
    <p class="team-name">{{item.teamName}}</p>
  </div>

  <div class="vote-images">
    <img [src]="'/images/voting/vote-icon.png'" alt="" class="vote-logo">
    <img [src]="'/images/voting/vote-text.png'" alt="" class="vote-text">
  </div>
</div>
