<div class="container">
  <p class="clear-data" (click)="clearData()"><span class="material-symbols-outlined">
refresh
</span></p>
 <div class="images-container">
    <img src="/images/voting/hongleong-logo.png" alt="" class="left-logo">
    <img src="/images/result/hongleong-tieu-de-text.png" alt="" class="right-logo">
  </div>

  <div class="voting-details">
      <div class="vote-count-container">
      <div class="vote-count" *ngFor="let item of items" >
        <p class="team-name">
          {{item.performanceName}}
        </p>
        <div class="progress-bar">
          <div 
            class="progress-fill"
            [style.width.%]="item.percent"> <div class="progress-inner"></div>
          </div>
          
          <span class="count">{{ item?.count }} <br /> </span>
        </div>
      </div>
    </div>
  </div>
</div>
